<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Calculator refresher data value format</title>
    </head>
    <body>
        <div class="calculator">
            <input type="text" id="display">
            <div class="buttons">
                <button class="btn operator" data-value="C">C</button>
                <button class="btn operator" data-value="X">X</button>

                <button class="btn operator" data-value="/">/</button>

                <button class="btn operator" data-value=".">.</button>


                <button class="btn" data-value="7">7</button>
                <button class="btn" data-value="8">8</button>
                <button class="btn" data-value="9">9</button>
                <button class="btn operator" data-value="*">*</button>

                <button class="btn" data-value="4">4</button>
                <button class="btn" data-value="5">5</button>
                <button class="btn" data-value="6">6</button>
                 <button class="btn operator" data-value="-">-</button>

                <button class="btn" data-value="1">1</button>
                <button class="btn" data-value="2">2</button>
                <button class="btn" data-value="3">3</button>
                 <button class="btn operator" data-value="+">+</button>
                  <button class="btn operator" data-value="%">%</button>

                <button class="btn" data-value="0">0</button>
                <button class="btn operator" data-value=".">.</button>

                <button class="btn operator" id="equals" data-value="=">=</button>

            </div>
        </div>
        <footer>
    <p class="footer-text">&copy; Ser Third 2026. Broken shield, steady hand.</p>
</footer>

        <script src="index.js"></script>
    </body>
</html>
